name: publish

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@emgeebee"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Auth via npm Trusted Publisher (OIDC) — no NPM_TOKEN required.
      # Configured on npmjs.com for workflow file: publish.yml
      - name: Publish to npm
        run: npm publish --provenance --access public
